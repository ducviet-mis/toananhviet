<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh mục tài liệu - Gia sư Toán THCS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <!-- Nhúng thư viện Supabase cần thiết để kết nối Database -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Thanh Menu -->
  <header>
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/40?text=TAV'">
        TOÁN ANH VIỆT
      </a>
      <ul class="nav-menu">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="category.html?grade=6" id="nav-g-6">Toán 6</a></li>
        <li><a href="category.html?grade=7" id="nav-g-7">Toán 7</a></li>
        <li><a href="category.html?grade=8" id="nav-g-8">Toán 8</a></li>
        <li><a href="category.html?grade=9" id="nav-g-9">Toán 9</a></li>
        <li><a href="index.html#about">Lớp học Gia sư</a></li>
        <li><a href="index.html#contact">Liên hệ</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2 class="section-title" id="category-title">Tài liệu học tập</h2>

    <!-- Bộ lọc nhanh loại đề thi/ tài liệu -->
    <div class="filter-container">
      <button class="filter-btn active" onclick="filterCategory('Tất cả')">Tất cả</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi giữa kì 1')">Đề giữa kì 1</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi cuối kì 1')">Đề cuối kì 1</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi giữa kì 2')">Đề giữa kì 2</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi cuối kì 2')">Đề cuối kì 2</button>
      <button class="filter-btn" onclick="filterCategory('Đề cương học kì 1')">Đề cương HK1</button>
      <button class="filter-btn" onclick="filterCategory('Đề cương học kì 2')">Đề cương HK2</button>
      <button class="filter-btn" onclick="filterCategory('Chuyên đề Toán')">Chuyên đề Toán</button>
    </div>

    <!-- Danh sách tài liệu -->
    <div class="doc-grid" id="category-docs-container">
      <p style="text-align: center; grid-column: 1/-1;">Đang nạp danh sách tài liệu...</p>
    </div>
  </main>

  <footer>
    <p>© 2026 Website Gia Sư Toán THCS. Phát triển bởi Gia Sư Toán.</p>
    <p>Hotline/Zalo hỗ trợ: 09x.xxx.xxxx - Địa chỉ: Hà Nội</p>
  </footer>

  <script>
    // 1. Cấu hình thông tin kết nối Supabase của dự án toananhviet
    const SUPABASE_URL = 'https://zlltfgfbydgojuuiprsb.supabase.co';
    
    // ĐIỀN MÃ KEY CỦA BẠN VÀO GIỮA HAI DẤU NHÁY ĐƠN DƯỚI ĐÂY
    const SUPABASE_KEY = 'sb_publishable_Od5eLUer9_l6i6IzNVBjvg_VAZy-9t2'; 

    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let allDocuments = []; // Mảng chứa dữ liệu của tài liệu đã lấy từ Supabase
    let activeFilter = 'Tất cả';

    // Đọc tham số lớp (ví dụ ?grade=8) trên thanh địa chỉ
    const urlParams = new URLSearchParams(window.location.search);
    const currentGradeNum = urlParams.get('grade') || '6';
    const currentGradeLabel = "Toán " + currentGradeNum;

    // Cập nhật giao diện tiêu đề theo khối lớp đang chọn
    document.getElementById('category-title').innerText = `Tài liệu môn ${currentGradeLabel}`;
    
    // Sáng đèn (Highlight) nút menu tương ứng
    const navActiveBtn = document.getElementById(`nav-g-${currentGradeNum}`);
    if (navActiveBtn) navActiveBtn.classList.add('active');

    // 2. Hàm lấy dữ liệu trực tiếp từ bảng của Supabase (Cú pháp chuẩn không dùng dấu nháy kép)
    async function fetchCategoryDocuments() {
      const container = document.getElementById('category-docs-container');
      try {
        const { data, error } = await _supabase
          .from('toananhviet')
          .select('*')
          .or(`lop.eq.${currentGradeLabel},lop.eq.${currentGradeNum}`);

        if (error) throw error;

        allDocuments = data || [];
        renderDocuments();
      } catch (error) {
        console.error("Lỗi khi đồng bộ dữ liệu từ Supabase:", error);
        container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Lỗi khi tải dữ liệu từ cơ sở dữ liệu Supabase.</p>';
      }
    }

    // 3. Hàm render danh sách tài liệu ra cấu trúc HTML kết nối với trang detail.html
    function renderDocuments() {
      const container = document.getElementById('category-docs-container');
      container.innerHTML = '';

      // Thực hiện bộ lọc theo Loại tài liệu (loai_de) khi click các nút bấm
      const filtered = allDocuments.filter(doc => {
        if (activeFilter === 'Tất cả') return true;
        return doc.loai_de === activeFilter;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Không tìm thấy tài liệu nào thuộc danh mục này.</p>';
        return;
      }

      filtered.forEach(doc => {
        // Tự động lấy ảnh mẫu mặc định nếu không có ảnh tự chế
        const thumbnailSrc = doc.anh_bia || 'https://via.placeholder.com/300x400?text=TailieuToan';
        
        // Tạo đường link chuyển tiếp sang trang detail.html kèm dữ liệu
        const detailLink = `detail.html?file=${encodeURIComponent(doc.link_file || '')}&title=${encodeURIComponent(doc.tieu_de || '')}&desc=${encodeURIComponent(doc.mo_ta || '')}&grade=${encodeURIComponent(doc.lop || '')}&cat=${encodeURIComponent(doc.loai_de || '')}&thumbnail=${encodeURIComponent(thumbnailSrc)}`;

        const cardHtml = `
          <div class="doc-card" style="cursor: pointer;" onclick="window.location.href='${detailLink}'">
            <div class="doc-thumbnail-container">
              <img class="doc-thumbnail" src="${thumbnailSrc}" alt="${doc.tieu_de}">
            </div>
            <div class="doc-info">
              <div class="doc-badges">
                <span class="badge badge-grade">Toán ${doc.lop}</span>
                <span class="badge badge-cat">${doc.loai_de}</span>
              </div>
              <h3 class="doc-title">${doc.tieu_de}</h3>
              <div class="doc-footer">
                <span class="doc-date">🚀 Trạng thái: Sẵn sàng</span>
                <a href="${detailLink}" class="btn-download" onclick="event.stopPropagation();">📖 Xem & Tải tài liệu</a>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    }

    // 4. Hàm đổi bộ lọc loại tài liệu khi bạn bấm các nút
    function filterCategory(categoryName) {
      activeFilter = categoryName;
      
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => {
        if (btn.innerText.includes(categoryName.replace('Đề thi ', '').replace('Đề cương học kì ', 'Đề cương HK'))) {
          btn.classList.add('active');
        } else if (categoryName === 'Tất cả' && btn.innerText === 'Tất cả') {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      renderDocuments();
    }

    // Chạy đồng bộ dữ liệu ngay khi trang web tải xong
    document.addEventListener("DOMContentLoaded", fetchCategoryDocuments);
  </script>
</body>
</html>
