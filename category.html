  <main>
    <h2 class="section-title" id="category-title">Tài liệu học tập</h2>

    <!-- Bộ lọc nhanh loại đề thi/ tài liệu -->
    <div class="filter-container">
      <button class="filter-btn active" onclick="filterCategory('Tất cả')">Tất cả</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi giữa kì 1')">Đề giữa kì 1</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi cuối kì 1')">Đề cuối kì 1</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi giữa kì 2')">Đề giữa kì 2</button>
      <button class="filter-btn" onclick="filterCategory('Đề thi cuối kì 2')">Đề cuối kì 2</button>
      <button class="filter-btn" onclick="filterCategory('Đề cương học kì 1')">Đề cương HK1</button>
      <button class="filter-btn" onclick="filterCategory('Đề cương học kì 2')">Đề cương HK2</button>
      <button class="filter-btn" onclick="filterCategory('Chuyên đề Toán')">Chuyên đề Toán</button>
    </div>

    <!-- Danh sách tài liệu -->
    <div class="doc-grid" id="category-docs-container">
      <p style="text-align: center; grid-column: 1/-1;">Đang nạp danh sách tài liệu...</p>
    </div>

  <script>
    let allDocuments = []; // Mảng chứa dữ liệu của tài liệu đã lọc đúng khối lớp
    let activeFilter = 'Tất cả';

    // Đọc tham số lớp (ví dụ ?grade=6) trên thanh địa chỉ
    const urlParams = new URLSearchParams(window.location.search);
    const currentGradeNum = urlParams.get('grade') || '6';
    const currentGradeLabel = "Toán " + currentGradeNum;

    // Cập nhật giao diện theo khối lớp đang chọn
    document.getElementById('category-title').innerText = `Tài liệu môn ${currentGradeLabel}`;
    
    // Highlight menu tương ứng
    const navActiveBtn = document.getElementById(`nav-g-${currentGradeNum}`);
    if (navActiveBtn) navActiveBtn.classList.add('active');

    async function fetchCategoryDocuments() {
      const container = document.getElementById('category-docs-container');
      try {
        // Kết nối API GitHub để tìm tài liệu
        const response = await fetch('https://api.github.com/repos/ducviet-mis/toananhviet/contents/documents');
        if (!response.ok) throw new Error('Không thể kết nối đến máy chủ chứa file.');

        const files = await response.json();
        const jsonFiles = files.filter(file => file.name.endsWith('.json')).reverse();
        
        const tempDocs = [];
        for (const file of jsonFiles) {
          const res = await fetch(file.download_url);
          const doc = await res.json();
          // Chỉ lấy tài liệu đúng của lớp học này (Ví dụ: "Toán 8")
          if (doc.grade === currentGradeLabel) {
            // Đính kèm thêm download_url gốc của file JSON từ GitHub vào đối tượng dữ liệu
            doc.rawJsonUrl = file.download_url;
            tempDocs.push(doc);
          }
        }

        allDocuments = tempDocs;
        renderDocuments();
      } catch (error) {
        console.error(error);
        container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Lỗi khi tải dữ liệu từ máy chủ.</p>';
      }
    }

    // Hàm render danh sách tài liệu ra HTML (có lọc)
    function renderDocuments() {
      const container = document.getElementById('category-docs-container');
      container.innerHTML = '';

      // Thực hiện lọc theo Loại tài liệu
      const filtered = allDocuments.filter(doc => {
        if (activeFilter === 'Tất cả') return true;
        return doc.category === activeFilter;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align: center; grid-column: 1/-1;">Không tìm thấy tài liệu nào thuộc danh mục này.</p>';
        return;
      }

      filtered.forEach(doc => {
        const detailLink = `detail.html?file=${encodeURIComponent(doc.rawJsonUrl)}`;
        const cardHtml = `
          <div class="doc-card" style="cursor: pointer;" onclick="window.location.href='${detailLink}'">
            <div class="doc-thumbnail-container">
              <img class="doc-thumbnail" src="${doc.thumbnail || 'https://via.placeholder.com/300x400?text=TailieuToan'}" alt="${doc.title}">
            </div>
            <div class="doc-info">
              <div class="doc-badges">
                <span class="badge badge-grade">${doc.grade}</span>
                <span class="badge badge-cat">${doc.category}</span>
              </div>
              <h3 class="doc-title">${doc.title}</h3>
              <div class="doc-footer">
                <span class="doc-date">📅 Đăng: ${doc.date}</span>
                <a href="${detailLink}" class="btn-download">📖 Xem & Tải tài liệu</a>
              </div>
            </div>
          </div>
        `;
        container.innerHTML += cardHtml;
      });
    }

    // Hàm đổi bộ lọc loại tài liệu khi bấm nút bấm
    function filterCategory(categoryName) {
      activeFilter = categoryName;
      
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(btn => {
        if (btn.innerText.includes(categoryName.replace('Đề thi ', '').replace('Đề cương học kì ', 'Đề cương HK'))) {
          btn.classList.add('active');
        } else if (categoryName === 'Tất cả' && btn.innerText === 'Tất cả') {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      renderDocuments();
    }

    document.addEventListener("DOMContentLoaded", fetchCategoryDocuments);
  </script>
  <!-- Nhúng thư viện kiểm tra session và dựng Avatar Dropdown cao cấp cho trang danh mục -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (async function buildAvatarDropdownMenu() {
      const SUPABASE_URL = 'https://zlltfgfbydgojuuiprsb.supabase.co';
      const SUPABASE_KEY = 'sb_publishable_Od5eLUer9_l6i6IzNVBjvg_VAZy-9t2';
      const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const { data: { user } } = await _supabase.auth.getUser();

      const loginLinks = document.querySelectorAll('a[href="login.html"]');

        .menu-avatar-img {
          width: 38px;
          height: 38px;

          object-fit: cover;
          vertical-align: middle;

          min-width: 200px;
          box-shadow: 0 10px 25px rgba(0,0,0,0.1);
          border-radius: 8px;
          padding: 10px 0;
          z-index: 9999;
          margin-top: 10px;
          border: 1px solid #e2e8f0;
        }
        .user-profile-dropdown:hover .dropdown-menu-box {

          padding: 8px 16px;

        }

          font-weight: 600;

          text-align: left;
          font-weight: 500;

        .dropdown-item-link:hover {
          background-color: #f1f5f9;

          border-top: 1px solid #f1f5f9;

      `;
      document.head.appendChild(style);

      targetLi.innerHTML = `
        <div class="user-profile-dropdown">
          <img class="menu-avatar-img" src="${avatarSrc}" alt="Avatar">
          <div class="dropdown-menu-box">
            <div class="dropdown-info-header">
              <div class="dropdown-info-name">${displayName}</div>
              <div class="dropdown-info-email">${user.email}</div>
            </div>
            <a href="profile.html" class="dropdown-item-link">Thông tin cá nhân</a>
            <a href="category.html?grade=8" class="dropdown-item-link">Kho bài tập của tôi</a>
            <a href="#" id="menu-btn-logout-action" class="dropdown-item-link dropdown-item-logout">Đăng xuất</a>
          </div>
        </div>
      `;

      document.getElementById('menu-btn-logout-action').addEventListener('click', async (e) => {
        e.preventDefault();
        await _supabase.auth.signOut();
        window.location.reload(); 
      });

    })();
  </script>
