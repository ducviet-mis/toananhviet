<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phòng Thi Trắc Nghiệm - Toán Anh Việt</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/es6-shim/0.35.6/es6-shim.min.js"></script>
  <style>
    body {
      background-color: #f1f5f9;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      flex-shrink: 0;
    }
    .exam-wrapper {
      display: flex;
      flex: 1;
      height: calc(100vh - 80px);
      overflow: hidden;
      position: relative;
    }
    /* Cột trái: Hiển thị file Đề thi (Word/PDF) */
    .pdf-pane {
      width: 60%;
      height: 100%;
      border-right: 3px solid #cbd5e1;
      background: #475569;
    }
    .pdf-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Cột phải: Phiếu trả lời trắc nghiệm gọn gàng */
    .answersheet-pane {
      width: 40%;
      height: 100%;
      background: #ffffff;
      overflow-y: auto;
      padding: 25px;
      position: relative;
    }
    .timer-badge {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #0284c7;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
    }
    .mobile-tabs {
      display: none;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      text-align: center;
      padding: 15px;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      background: none;
      cursor: pointer;
      color: #64748b;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.active {
      color: #0284c7;
      border-bottom-color: #0284c7;
    }
    /* Thiết kế dòng câu trả lời gọn nhẹ */
    .answer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 15px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .answer-row.correct {
      border-left: 5px solid #22c55e;
      background-color: #f0fdf4;
    }
    .answer-row.incorrect {
      border-left: 5px solid #ef4444;
      background-color: #fef2f2;
    }
    .q-num-label {
      font-weight: bold;
      color: #1e293b;
      min-width: 60px;
    }
    /* Các nút chọn tròn A, B, C, D nằm ngang */
    .bubble-group {
      display: flex;
      gap: 10px;
    }
    .bubble-label {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 2px solid #cbd5e1;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9rem;
      transition: all 0.2s;
      user-select: none;
    }
    .bubble-group input[type="radio"] {
      display: none;
    }
    .bubble-group input[type="radio"]:checked + .bubble-label {
      background-color: #0284c7;
      color: white;
      border-color: #0284c7;
    }
    .short-input-field {
      width: 180px;
      padding: 8px 12px;
      border: 1.5px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }
    .short-input-field:focus {
      border-color: #0284c7;
    }
    /* Hiển thị đáp án đúng sau khi nộp */
    .result-key-info {
      font-size: 0.85rem;
      margin-top: 5px;
      color: #475569;
      display: none;
    }
    #result-box {
      background: #e0f2fe;
      border: 2px dashed #0284c7;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 25px;
      display: none;
    }
    @media (max-width: 768px) {
      .exam-wrapper {
        flex-direction: column;
        height: calc(100vh - 130px);
      }
      .mobile-tabs {
        display: flex;
      }
      .pdf-pane, .answersheet-pane {
        width: 100%;
        height: 100%;
      }
      .pdf-pane.hidden-mobile, .answersheet-pane.hidden-mobile {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav-container" style="padding: 10px 20px;">
      <a href="index.html" class="logo">📐 TOÁN ANH VIỆT</a>
      <span style="font-weight: bold; color: #0284c7; font-size: 1rem;" id="exam-title-header">Đang tải đề thi...</span>
    </nav>
  </header>

  <div class="mobile-tabs">
    <button class="tab-btn active" id="tab-pdf" onclick="switchTab('pdf')">📋 Đọc Đề Bài</button>
    <button class="tab-btn" id="tab-sheet" onclick="switchTab('sheet')">✍️ Phiếu Trả Lời</button>
  </div>

  <div class="exam-wrapper">
    <!-- CỘT BÊN TRÁI: Trình xem tài liệu (Hỗ trợ cả Word và PDF) -->
    <div class="pdf-pane" id="pane-pdf-container">
      <iframe src="" id="pdf-viewer"></iframe>
    </div>

    <!-- CỘT BÊN PHẢI: Phiếu điền đáp án chấm điểm tự động -->
    <div class="answersheet-pane" id="pane-sheet-container">
      
      <div class="timer-badge">
        <span id="countdown">Thời gian: --:--</span>
        <button onclick="submitExam()" id="submit-btn" style="background: #e11d48; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">NỘP BÀI</button>
      </div>

      <div id="result-box">
        <h3 style="font-size: 1.5rem; color: #0369a1; margin-bottom: 5px;" id="result-score">-- / 10 điểm</h3>
        <p id="result-detail" style="color: #0284c7; font-weight: 500;">Bạn làm đúng -- / -- câu</p>
      </div>

      <!-- Danh sách các ô chọn đáp án -->
      <div id="questions-list"></div>
    </div>
  </div>

  <script>
    let quizData = null;
    let timeRemaining = 0;
    let timerInterval = null;
    let userAnswers = {};

    // Hàm chuẩn hóa link xem tài liệu (Nhúng Word qua Office Online)
    function getDocViewerUrl(filePath) {
      if (!filePath) return '';
      // Lấy link tuyệt đối của file
      let absoluteUrl = filePath;
      if (!filePath.startsWith('http://') && !filePath.startsWith('https://')) {
        absoluteUrl = window.location.origin + (filePath.startsWith('/') ? '' : '/') + filePath;
      }

      const fileExtension = absoluteUrl.split('.').pop().toLowerCase();
      if (fileExtension === 'pdf') {
        return absoluteUrl; // Nếu là PDF thì mở trực tiếp
      } else {
        // Nếu là Word (.docx, .doc), nhúng qua Office Apps Live Viewer
        return `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(absoluteUrl)}`;
      }
    }

    async function loadQuizRoom() {
      const urlParams = new URLSearchParams(window.location.search);
      const fileUrl = urlParams.get('id');

      if (!fileUrl) {
        alert("Không tìm thấy đường dẫn đề thi!");
        return;
      }

      try {
        const response = await fetch(decodeURIComponent(fileUrl));
        if (!response.ok) throw new Error();
        quizData = await response.json();

        document.getElementById('exam-title-header').innerText = quizData.title;
        
        // Nhúng file PDF hoặc Word
        document.getElementById('pdf-viewer').src = getDocViewerUrl(quizData.exam_file);

        timeRemaining = (quizData.duration || 45) * 60;
        startTimer();

        renderAnswerSheet();
      } catch (err) {
        alert("Lỗi tải phòng thi!");
      }
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          alert("Hết giờ làm bài! Hệ thống tự động nộp bài.");
          submitExam();
          return;
        }
        timeRemaining--;
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        document.getElementById('countdown').innerText = `⏱️ Còn lại: ${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
      }, 1000);
    }

    // Render phiếu điền đáp án cực kỳ gọn gàng
    function renderAnswerSheet() {
      const list = document.getElementById('questions-list');
      list.innerHTML = '';

      quizData.answer_keys.forEach((item) => {
        userAnswers[item.q_number] = '';

        const row = document.createElement('div');
        row.className = 'answer-row';
        row.id = `q-row-${item.q_number}`;

        let actionHtml = '';

        if (item.q_type === 'multiple_choice') {
          // Trắc nghiệm ABCD tròn
          actionHtml = `
            <div class="bubble-group">
              ${['A', 'B', 'C', 'D'].map(char => `
                <input type="radio" id="b-${item.q_number}-${char}" name="ans-${item.q_number}" value="${char}" onchange="saveAnswer(${item.q_number}, '${char}')">
                <label for="b-${item.q_number}-${char}" class="bubble-label">${char}</label>
              `).join('')}
            </div>
          `;
        } else {
          // Trả lời ngắn bằng ô nhập chữ/số
          actionHtml = `
            <input type="text" class="short-input-field" placeholder="Nhập đáp án..." oninput="saveAnswer(${item.q_number}, this.value)">
          `;
        }

        row.innerHTML = `
          <div class="q-num-label">Câu ${item.q_number}:</div>
          ${actionHtml}
          <div class="result-key-info" id="key-info-${item.q_number}">
            <span style="color: #22c55e; font-weight: bold;">Đáp án đúng: ${item.correct_answer}</span>
            ${item.explanation ? `<br><span style="color: #64748b;">Giải thích: ${item.explanation}</span>` : ''}
          </div>
        `;
        list.appendChild(row);
      });
    }

    function saveAnswer(qNum, value) {
      userAnswers[qNum] = value.trim();
    }

    // Chấm điểm tự động và Khóa bài thi
    function submitExam() {
      if (!confirm("Bạn muốn nộp bài thi?")) return;
      clearInterval(timerInterval);

      document.querySelectorAll('input, button').forEach(el => el.disabled = true);
      document.getElementById('submit-btn').style.display = 'none';

      let scorePerQuestion = quizData.total_score / quizData.answer_keys.length;
      let earnedScore = 0;
      let correctCount = 0;

      quizData.answer_keys.forEach(item => {
        const row = document.getElementById(`q-row-${item.q_number}`);
        const keyInfo = document.getElementById(`key-info-${item.q_number}`);
        
        let isCorrect = false;
        const studentAns = userAnswers[item.q_number] || '';

        if (item.q_type === 'multiple_choice') {
          if (studentAns.toUpperCase() === item.correct_answer.toUpperCase()) {
            isCorrect = true;
          }
        } else {
          if (studentAns.toLowerCase() === item.correct_answer.toLowerCase()) {
            isCorrect = true;
          }
        }

        // Đổi màu hiển thị phiếu trả lời
        if (isCorrect) {
          row.classList.add('correct');
          earnedScore += scorePerQuestion;
          correctCount++;
        } else {
          row.classList.add('incorrect');
        }

        // Hiện đáp án đúng và giải thích
        keyInfo.style.display = 'block';
      });

      // Show kết quả
      const resultBox = document.getElementById('result-box');
      resultBox.style.display = 'block';
      document.getElementById('result-score').innerText = `${earnedScore.toFixed(2)} / ${quizData.total_score} điểm`;
      document.getElementById('result-detail').innerText = `Bạn làm đúng ${correctCount} / ${quizData.answer_keys.length} câu`;

      document.getElementById('pane-sheet-container').scrollTop = 0;
    }

    function switchTab(tabName) {
      const tabPdf = document.getElementById('tab-pdf');
      const tabSheet = document.getElementById('tab-sheet');
      const panePdf = document.getElementById('pane-pdf-container');
      const paneSheet = document.getElementById('pane-sheet-container');

      if (tabName === 'pdf') {
        tabPdf.classList.add('active');
        tabSheet.classList.remove('active');
        panePdf.classList.remove('hidden-mobile');
        paneSheet.classList.add('hidden-mobile');
      } else {
        tabSheet.classList.add('active');
        tabPdf.classList.remove('active');
        paneSheet.classList.remove('hidden-mobile');
        panePdf.classList.add('hidden-mobile');
      }
    }

    function checkResponsive() {
      if (window.innerWidth <= 768) {
        switchTab('pdf');
      } else {
        document.getElementById('pane-pdf-container').classList.remove('hidden-mobile');
        document.getElementById('pane-sheet-container').classList.remove('hidden-mobile');
      }
    }

    window.addEventListener('resize', checkResponsive);
    document.addEventListener('DOMContentLoaded', () => {
      loadQuizRoom();
      checkResponsive();
    });
  </script>
</body>
</html>
