<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Toán Anh Việt</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .login-wrapper {
      max-width: 450px;
      margin: 60px auto;
      padding: 40px 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      position: relative;
    }
    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      box-sizing: border-box;
      transition: border 0.2s;
    }
    .form-group input:focus {
      border-color: #0284c7;
      outline: none;
    }
    
    /* CẤU HÌNH NÚT BẤM CÓ HIỆU ỨNG QUAY XOAY */
    .btn-submit-premium {
      width: 100%;
      padding: 14px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-submit-premium:hover {
      background: #0369a1;
    }
    .btn-submit-premium:disabled {
      opacity: 0.8;
      cursor: not-allowed;
    }

    /* VÒNG XOAY XOAY LOADING */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin-animation 0.8s linear infinite;
    }
    @keyframes spin-animation {
      to { transform: rotate(360deg); }
    }

    /* BẢNG THÔNG BÁO THÀNH CÔNG TRƯỢT MƯỢT MÀ (TOAST) */
    .toast-notification {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      background: #ffffff;
      border-left: 5px solid #22c55e;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      padding: 14px 24px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 99999;
      transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast-notification.show {
      top: 30px;
    }
    .toast-icon {
      background: #22c55e;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }
    .toast-text {
      font-weight: 600;
      color: #1e293b;
      font-size: 14px;
    }
    .error-display-msg {
      margin-top: 12px;
      font-size: 14px;
      color: #ef4444;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Khung thông báo trượt từ trên xuống -->
  <div id="success-toast" class="toast-notification">
    <div class="toast-icon">✓</div>
    <div class="toast-text">Đăng nhập thành công! </div>
  </div>

  <header>
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/40?text=TAV'">
        TOÁN ANH VIỆT
      </a>
      <ul class="nav-menu">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="category.html?grade=6">Toán 6</a></li>
        <li><a href="category.html?grade=7">Toán 7</a></li>
        <li><a href="category.html?grade=8">Toán 8</a></li>
        <li><a href="category.html?grade=9">Toán 9</a></li>
        <li><a href="quiz-list.html">Thi Online</a></li>
        <li><a href="index.html#register">Lớp học Gia sư</a></li>
        <li><a href="login.html" class="active">Đăng nhập</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="login-wrapper">
      <h2 style="margin:0 0 10px 0; font-size:24px; color:#1e293b;">Đăng Nhập</h2>
      <p style="margin:0 0 30px 0; color:#64748b; font-size:14px;">Hệ thống tài liệu độc quyền Toán Anh Việt</p>

      <form id="login-form-submit" onsubmit="handleUserLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="VD: hocsinhgioi@toananhviet.com" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>

        <button type="submit" id="btn-submit-login" class="btn-submit-premium">
          <div id="btn-loading-spinner" class="spinner"></div>
          <span id="btn-text-display">Đăng nhập</span>
        </button>
      </form>

      <div id="error-output" class="error-display-msg"></div>
    </div>
  </main>

  <script>
   const SUPABASE_URL = 'https://zlltfgfbydgojuuiprsb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Od5eLUer9_l6i6IzNVBjvg_VAZy-9t2';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleUserLogin(e) {
      e.preventDefault();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('error-output');
      
      const btnSubmit = document.getElementById('btn-submit-login');
      const spinner = document.getElementById('btn-loading-spinner');
      const btnText = document.getElementById('btn-text-display');
      const toast = document.getElementById('success-toast');

      errorDiv.style.display = 'none';
      btnSubmit.disabled = true;
      spinner.style.display = 'block';
      

      const { data, error } = await _supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        btnSubmit.disabled = false;
        spinner.style.display = 'none';
        btnText.innerText = 'Đăng nhập';
        errorDiv.innerText = 'Mật khẩu hoặc tài khoản chưa chính xác!';
        errorDiv.style.display = 'block';
      } else {
        btnText.innerText = 'Đăng nhập thành công!';
        toast.classList.add('show');

        // Ghi nhớ phiên đăng nhập tức thì cho máy tính
        localStorage.setItem('tav_user_session', JSON.stringify({
          name: data.user.user_metadata.full_name || 'Học viên',
          email: data.user.email,
          avatar: data.user.user_metadata.avatar_url || `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(data.user.email)}`
        }));

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      }
    }

    async function checkActiveSession() {
      const { data: { user } } = await _supabase.auth.getUser();
      if (user) {
        window.location.href = 'index.html';
      }
    }
    document.addEventListener('DOMContentLoaded', checkActiveSession);
  </script>
</body>
</html>
