<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin học viên - Toán Anh Việt</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .profile-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 20px;
    }
    .avatar-wrapper {
      position: relative;
    }
    .avatar-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0284c7;
      background: #f1f5f9;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group.full-width {
      grid-column: span 2;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-group input:disabled {
      background: #f8fafc;
      color: #94a3b8;
    }
    .btn-save {
      width: 100%;
      padding: 12px;
      background: #0284c7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-logout {
      width: 100%;
      padding: 10px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav-container">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/40?text=TAV'">
        TOÁN ANH VIỆT
      </a>
      <ul class="nav-menu" id="nav-menu-container">
        <li><a href="index.html">Trang chủ</a></li>
        <li><a href="category.html?grade=6">Toán 6</a></li>
        <li><a href="category.html?grade=7">Toán 7</a></li>
        <li><a href="category.html?grade=8">Toán 8</a></li>
        <li><a href="category.html?grade=9">Toán 9</a></li>
        <li><a href="quiz-list.html">Thi Online</a></li>
        <li><a href="index.html#about">Lớp học Gia sư</a></li>
        <li><a href="profile.html" class="active">Hồ sơ</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="profile-container">
      <div class="profile-header">
        <div class="avatar-wrapper">
          <img id="user-avatar" class="avatar-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="Avatar">
        </div>
        <div>
          <h2 id="welcome-title" style="margin:0; font-size:20px; color:#1e293b;">Học viên Toán Anh Việt</h2>
          <p id="user-email-display" style="margin:4px 0 0 0; color:#64748b; font-size:14px;"></p>
        </div>
      </div>

      <form id="profile-form" onsubmit="saveProfile(event)">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Họ và tên học sinh:</label>
            <input type="text" id="p-name" placeholder="Ví dụ: Nguyễn Văn A" required>
          </div>
          <div class="form-group">
            <label>Số điện thoại liên hệ:</label>
            <input type="tel" id="p-phone" placeholder="Ví dụ: 0987654321">
          </div>
          <div class="form-group">
            <label>Khối lớp đang học:</label>
            <select id="p-grade">
              <option value="6">Lớp 6</option>
              <option value="7">Lớp 7</option>
              <option value="8">Lớp 8</option>
              <option value="9">Lớp 9</option>
            </select>
          </div>
          <div class="form-group full-width">
            <label>Link ảnh Avatar (URL hình ảnh):</label>
            <input type="url" id="p-avatar-url" placeholder="Dán link ảnh online bất kỳ vào đây để đổi avatar" onchange="document.getElementById('user-avatar').src=this.value">
          </div>
        </div>
        <button type="submit" class="btn-save">💾 Lưu thay đổi thông tin</button>
      </form>

      <button onclick="handleLogout()" class="btn-logout">🚪 Đăng xuất tài khoản</button>
      <div id="status-msg" style="text-align:center; margin-top:10px; font-size:14px;"></div>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://zlltfgfbydgojuuiprsb.supabase.co';
    const SUPABASE_KEY = 'DÁN_MÃ_ANON_PUBLIC_KEY_CỦA_BẠN_VÀO_ĐÂY';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null;

    async function checkUserSession() {
      const { data: { user } } = await _supabase.auth.getUser();
      if (!user) {
        alert("Bạn chưa đăng nhập! Vui lòng đăng nhập để xem thông tin.");
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      document.getElementById('user-email-display').innerText = user.email;

      // Đọc metadata (thông tin cá nhân tự tạo) từ Supabase lưu trữ
      const meta = user.user_metadata || {};
      if(meta.full_name) document.getElementById('p-name').value = meta.full_name;
      if(meta.phone) document.getElementById('p-phone').value = meta.phone;
      if(meta.grade) document.getElementById('p-grade').value = meta.grade;
      if(meta.avatar_url) {
        document.getElementById('p-avatar-url').value = meta.avatar_url;
        document.getElementById('user-avatar').src = meta.avatar_url;
      } else {
        // Tự tạo avatar ngẫu nhiên theo email học sinh cho đẹp nếu chưa có ảnh
        document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(user.email)}`;
      }
      if(meta.full_name) document.getElementById('welcome-title').innerText = "Xin chào, " + meta.full_name;
    }

    async function saveProfile(e) {
      e.preventDefault();
      const msg = document.getElementById('status-msg');
      msg.style.color = '#0284c7';
      msg.innerText = 'Đang lưu thông tin dữ liệu...';

      const name = document.getElementById('p-name').value;
      const phone = document.getElementById('p-phone').value;
      const grade = document.getElementById('p-grade').value;
      const avatarUrl = document.getElementById('p-avatar-url').value;

      // Cập nhật đè thông tin bổ sung vào phần user_metadata của Supabase Auth
      const { data, error } = await _supabase.auth.updateUser({
        data: { 
          full_name: name,
          phone: phone,
          grade: grade,
          avatar_url: avatarUrl
        }
      });

      if (error) {
        msg.style.color = '#ef4444';
        msg.innerText = 'Gặp lỗi khi lưu: ' + error.message;
      } else {
        msg.style.color = '#22c55e';
        msg.innerText = 'Cập nhật hồ sơ học viên thành công!';
        document.getElementById('welcome-title').innerText = "Xin chào, " + name;
      }
    }

    async function handleLogout() {
      await _supabase.auth.signOut();
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', checkUserSession);
  </script>
</body>
</html>
